server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxied server-side so the browser only ever talks to this origin —
    # same same-origin trick as proxy.conf.json in dev, no CORS needed.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s; # translation/chat calls can run long
        proxy_buffering off;      # chat responses stream token-by-token, don't batch them
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
